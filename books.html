<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The book Verse Community</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth transitions for the description toggle */
        .description-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .description-content.expanded {
            grid-template-rows: 1fr;
        }
        .description-inner {
            overflow: hidden;
        }
    </style>
</head>
<!-- Applied a light skin/peach background color and dark brown text -->
<body class="bg-[#fdf6f0] min-h-screen font-sans text-[#4a3b32]">

    <!-- Header (Slightly darker skin tone) -->
    <header class="bg-[#f6e5d8] shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 text-[#8a6b58]">
                <i data-lucide="book-open" class="w-8 h-8 text-[#a9816b]"></i>
                <h1 class="text-2xl font-bold text-[#4a3b32]">The book Verse Community</h1>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-[#735745]">
                <a href="#" class="hover:text-[#a9816b] transition-colors">Home</a>
                <a href="#" class="hover:text-[#a9816b] transition-colors">Best Sellers</a>
                <a href="#" class="hover:text-[#a9816b] transition-colors">New Arrivals</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-8 sm:py-12">
        <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4 px-2 sm:px-0">
            <div class="text-center sm:text-left">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-[#4a3b32]">Featured Books</h2>
                <p class="mt-1 sm:mt-2 text-sm sm:text-base text-[#735745]">Discover your next great read.</p>
            </div>

            <!-- Search Bar -->
            <div class="relative w-full md:max-w-xs">
                <input type="text" id="search-input" placeholder="Search title or author..." 
                       class="w-full pl-10 pr-4 py-2 sm:py-2.5 rounded-xl border-[#d9bbaa] shadow-sm focus:ring-[#cda692] focus:border-[#cda692] bg-[#fffbf8] text-[#4a3b32] placeholder-[#a9816b] outline-none border transition-all">
                <i data-lucide="search" class="absolute left-3 top-2.5 sm:top-3 w-5 h-5 text-[#a9816b]"></i>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="mb-8 px-2 sm:px-0 flex flex-wrap gap-2 justify-center sm:justify-start" id="category-filters">
            <button onclick="setCategory('All', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#a9816b] text-white shadow-inner">All</button>
            <button onclick="setCategory('Motivational', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#f6e5d8] text-[#8a6b58] hover:bg-[#e8d5c8]">Motivational</button>
            <button onclick="setCategory('Romance', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#f6e5d8] text-[#8a6b58] hover:bg-[#e8d5c8]">Romance</button>
            <button onclick="setCategory('Melancholic', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#f6e5d8] text-[#8a6b58] hover:bg-[#e8d5c8]">Melancholic</button>
            <button onclick="setCategory('Curious', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#f6e5d8] text-[#8a6b58] hover:bg-[#e8d5c8]">Curious</button>
            <button onclick="setCategory('Relaxed', this)" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold transition-colors bg-[#f6e5d8] text-[#8a6b58] hover:bg-[#e8d5c8]">Relaxed</button>
        </div>

        <!-- Loading State -->
        <div id="loader" class="flex flex-col items-center justify-center py-20 text-[#8a6b58]">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-[#a9816b]"></i>
            <p>Loading books from Google Sheets...</p>
        </div>

        <!-- Error State -->
        <div id="error-message" class="hidden text-center py-10 bg-[#fde8e8] rounded-xl border border-[#f8b4b4] mx-2 sm:mx-0">
            <i data-lucide="alert-circle" class="w-10 h-10 mx-auto text-red-500 mb-2"></i>
            <p class="text-red-700 font-medium">Failed to load books.</p>
            <p class="text-red-600 text-sm mt-1">Please ensure your Google Sheet access is set to "Anyone with the link can view".</p>
        </div>

        <!-- No Results State -->
        <div id="no-results" class="hidden text-center py-20 text-[#8a6b58]">
            <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
            <p class="text-lg font-medium">No books found matching your search.</p>
        </div>

        <!-- Books Grid Container: grid-cols-2 ensures 2 items side-by-side always -->
        <div id="books-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-6 hidden">
            <!-- Book Cards will be injected here via JavaScript -->
        </div>
    </main>

    <script>
        // Initialize icons
        lucide.createIcons();

        // --- GOOGLE SHEETS CONFIGURATION ---
        const SHEET_ID = '1HpXZTKB6VYtlUGx5BRDLkQ5Qxoclnxq008NA_Wyqm7k';
        const GID = '0';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        // Global variable to store all valid books for search filtering
        let allBooksData = [];
        let currentCategory = 'All';

        // --- 1. THE REQUESTED GOOGLE DRIVE LINK CONVERTER FUNCTION ---
        function convertDriveImageLink(url) {
            if (!url) return '';
            let fileId = '';
            const fileIdMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (fileIdMatch && fileIdMatch[1]) {
                fileId = fileIdMatch[1];
            } else {
                const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
                if (idMatch && idMatch[1]) {
                    fileId = idMatch[1];
                }
            }
            if (fileId) {
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
            }
            return url; 
        }

        // --- APP LOGIC ---
        const getCellValue = (row, index) => {
            if (row.c && row.c[index] && row.c[index].v !== null && row.c[index].v !== undefined) {
                return row.c[index].v;
            }
            return '';
        };

        async function fetchBooks() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const text = await response.text();
                const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
                const data = JSON.parse(jsonString);
                const rows = data.table.rows;
                
                // Process rows to skip header and store in global array
                allBooksData = [];
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const title = getCellValue(row, 2) || 'Unknown Title';
                    
                    // Skip the header row
                    if (i === 0 && (title.toLowerCase().includes('book name') || title === 'Unknown Title')) {
                        continue;
                    }

                    // Grab the buy link and ensure it has http/https to work properly as an external link
                    let rawBuyLink = getCellValue(row, 5);
                    if (rawBuyLink && typeof rawBuyLink === 'string' && !rawBuyLink.startsWith('http')) {
                        rawBuyLink = 'https://' + rawBuyLink;
                    }

                    allBooksData.push({
                        originalImageUrl: getCellValue(row, 1),
                        title: title,
                        author: getCellValue(row, 3) || 'Unknown Author',
                        price: getCellValue(row, 4),
                        buyLink: rawBuyLink,
                        description: getCellValue(row, 6) || 'No description available.',
                        category: getCellValue(row, 7) || '', // 8th column containing the genre
                        originalIndex: i // Keep track of index for unique IDs
                    });
                }
                
                renderBooks(allBooksData);
                
                // Setup search listener after data is fetched
                document.getElementById('search-input').addEventListener('input', applyFilters);

            } catch (error) {
                console.error("Error fetching sheet data:", error);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('error-message').classList.remove('hidden');
            }
        }

        function setCategory(category, btnElement) {
            currentCategory = category;
            
            // Reset all buttons to default style
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-[#a9816b]', 'text-white', 'shadow-inner');
                btn.classList.add('bg-[#f6e5d8]', 'text-[#8a6b58]', 'hover:bg-[#e8d5c8]');
            });
            
            // Set active style for clicked button
            btnElement.classList.remove('bg-[#f6e5d8]', 'text-[#8a6b58]', 'hover:bg-[#e8d5c8]');
            btnElement.classList.add('bg-[#a9816b]', 'text-white', 'shadow-inner');
            
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            const filteredBooks = allBooksData.filter(book => {
                const matchesSearch = book.title.toLowerCase().includes(searchTerm) || 
                                      book.author.toLowerCase().includes(searchTerm);
                
                // Check if book matches the selected category (case-insensitive)
                const matchesCategory = currentCategory === 'All' || 
                                        book.category.toLowerCase().includes(currentCategory.toLowerCase());
                
                return matchesSearch && matchesCategory;
            });
            
            renderBooks(filteredBooks);
        }

        function renderBooks(books) {
            const grid = document.getElementById('books-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = ''; 
            
            if (books.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                
                books.forEach((book) => {
                    const finalImageUrl = convertDriveImageLink(book.originalImageUrl);

                    const card = document.createElement('div');
                    // Changed card background to slightly off-white that matches skin theme
                    card.className = "bg-[#fffbf8] rounded-xl sm:rounded-2xl shadow-sm border border-[#f0e0d5] overflow-hidden flex flex-col hover:shadow-md transition-shadow duration-300";

                    // Image ratio set to aspect-[2/3] which is exactly 6:9
                    const imageHtml = finalImageUrl 
                        ? `<img src="${finalImageUrl}" alt="${book.title}" class="w-full aspect-[2/3] object-cover object-top bg-[#f6e5d8]" onerror="this.src='https://placehold.co/400x600/f6e5d8/8a6b58?text=No+Cover'">`
                        : `<div class="w-full aspect-[2/3] bg-[#f6e5d8] flex items-center justify-center text-[#a9816b]"><i data-lucide="image-off" class="w-10 h-10 sm:w-12 sm:h-12"></i></div>`;

                    // Handle Price display - Formatting in INR (₹)
                    let displayPrice = book.price;
                    if (displayPrice && typeof displayPrice === 'number') {
                        displayPrice = '₹' + displayPrice.toFixed(2);
                    } else if (displayPrice) {
                        // Strip dollar signs if accidentally present in text and append rupee
                        let cleanPrice = displayPrice.toString().replace('$', '').trim();
                        if (!cleanPrice.startsWith('₹') && !cleanPrice.toLowerCase().includes('free')) {
                            displayPrice = '₹' + cleanPrice;
                        } else {
                            displayPrice = cleanPrice;
                        }
                    }

                    const descId = `desc-${book.originalIndex}`;

                    card.innerHTML = `
                        ${imageHtml}
                        <div class="p-3 sm:p-5 flex flex-col flex-grow">
                            <div class="mb-1 sm:mb-2">
                                <h3 class="text-sm sm:text-lg font-bold text-[#4a3b32] leading-tight mb-1 line-clamp-2">${book.title}</h3>
                                <p class="text-xs sm:text-sm text-[#8a6b58] font-medium line-clamp-1">${book.author}</p>
                            </div>
                            
                            <div class="text-base sm:text-xl font-extrabold text-[#b87c5e] mb-2 sm:mb-4">
                                ${displayPrice ? displayPrice : 'Free'}
                            </div>

                            <!-- Description Toggle Area -->
                            <div class="mb-3 sm:mb-4 text-xs sm:text-sm text-[#735745]">
                                <button onclick="toggleDescription('${descId}', this)" class="text-[#a9816b] hover:text-[#8a6b58] font-semibold flex items-center gap-1 transition-colors">
                                    <span>See more</span>
                                    <i data-lucide="chevron-down" class="w-3 h-3 sm:w-4 sm:h-4 transition-transform duration-300" id="icon-${descId}"></i>
                                </button>
                                
                                <div id="${descId}" class="description-content mt-1 sm:mt-2">
                                    <div class="description-inner prose prose-sm text-[#735745] text-xs sm:text-sm">
                                        <p>${book.description.replace(/\n/g, '<br>')}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Push button to bottom -->
                            <div class="mt-auto pt-3 sm:pt-4 border-t border-[#f0e0d5]">
                                <a href="${book.buyLink || '#'}" target="_blank" rel="noopener noreferrer" 
                                   class="${!book.buyLink ? 'opacity-50 cursor-not-allowed pointer-events-none' : 'hover:bg-[#cda692] hover:shadow-md hover:-translate-y-0.5'} 
                                          w-full bg-[#d9bbaa] text-[#4a3b32] font-bold py-2 sm:py-2.5 px-2 sm:px-4 rounded-lg sm:rounded-xl flex items-center justify-center gap-1 sm:gap-2 transition-all duration-200 text-xs sm:text-base">
                                    <i data-lucide="shopping-bag" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                                    Buy Now
                                </a>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                grid.classList.remove('hidden');
            }

            // Re-initialize Lucide icons for the newly injected HTML
            lucide.createIcons();
            document.getElementById('loader').classList.add('hidden');
        }

        window.toggleDescription = function(descId, btnElement) {
            const descContainer = document.getElementById(descId);
            const icon = document.getElementById(`icon-${descId}`);
            const span = btnElement.querySelector('span');
            
            if (descContainer.classList.contains('expanded')) {
                descContainer.classList.remove('expanded');
                span.innerText = 'See more';
                icon.style.transform = 'rotate(0deg)';
            } else {
                descContainer.classList.add('expanded');
                span.innerText = 'See less';
                icon.style.transform = 'rotate(180deg)';
            }
        };

        // Start fetching data when the page loads
        document.addEventListener('DOMContentLoaded', fetchBooks);

    </script>
</body>
</html>
