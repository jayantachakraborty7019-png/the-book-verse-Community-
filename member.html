<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Members Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --skin-light: #FFFBF9;
            --skin-medium: #F3E5D8;
            --skin-warm: #E6D2C1;
            --skin-accent: #C4A484;
            --text-dark: #2D241E;
            --text-muted: #8A7E76;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--skin-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Card Styles */
        .member-card {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background-color: white;
            border: 1px solid rgba(196, 164, 132, 0.2);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -15px rgba(196, 164, 132, 0.15);
            border-color: var(--skin-accent);
        }

        .image-frame {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--skin-medium), var(--skin-accent));
        }

        .image-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            background-color: #f8fafc;
        }

        .category-badge {
            color: var(--skin-accent);
            font-weight: 700;
            letter-spacing: 0.15em;
            font-size: 7.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--skin-medium);
            padding-bottom: 2px;
        }

        .filter-btn {
            transition: all 0.3s ease;
            color: var(--text-muted);
            font-size: 8.5px;
            letter-spacing: 0.12em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .filter-btn.active {
            color: var(--text-dark);
            border-bottom: 1.5px solid var(--text-dark);
        }

        /* Action Buttons */
        .btn-premium {
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            font-size: 8px;
            letter-spacing: 0.12em;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
        }

        .btn-premium:hover {
            transform: translateY(-1.5px);
            opacity: 0.9;
        }

        .btn-outline {
            border: 1px solid var(--skin-medium);
            color: var(--text-dark);
        }

        .btn-outline:hover {
            background-color: var(--skin-light);
            border-color: var(--skin-accent);
        }

        .loader {
            border-top-color: var(--skin-accent);
            animation: spinner 1.2s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased">

    <section class="min-h-screen">
        <header class="py-12 px-6 text-center">
            <div class="max-w-4xl mx-auto">
                <span class="inline-block mb-3 text-[8px] font-bold tracking-[0.4em] text-stone-400 uppercase">
                    The 2026 Community Registry
                </span>
                <h1 class="text-3xl md:text-5xl font-light text-stone-900 mb-8 tracking-tight">
                    View Our Members
                </h1>
                
                <div class="flex flex-wrap justify-center gap-6 mt-6">
                    <button onclick="setFilter('All')" class="filter-btn active px-2 py-1">All</button>
                    <button onclick="setFilter('Author')" class="filter-btn px-2 py-1">Author</button>
                    <button onclick="setFilter('Readers')" class="filter-btn px-2 py-1">Readers</button>
                    <button onclick="setFilter('Reviewer')" class="filter-btn px-2 py-1">Reviewer</button>
                    <button onclick="setFilter('Other')" class="filter-btn px-2 py-1">Other</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 pb-24">
            <!-- Loading -->
            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="loader ease-linear rounded-full border-2 border-stone-200 h-8 w-8 mb-4"></div>
                <p class="text-stone-400 uppercase tracking-[0.3em] text-[7px] font-bold">Connecting Registry</p>
            </div>

            <!-- Grid -->
            <div id="members-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
                <!-- Cards injected here -->
            </div>
        </main>

        <footer class="py-12 border-t border-stone-100 text-center">
            <p class="text-stone-400 text-[7px] tracking-[0.4em] uppercase font-bold">&copy; 2026 Membership Community Professional Directory</p>
        </footer>
    </section>

    <script>
        let allMembers = [];
        let currentFilter = 'All';

        function getDriveImageUrl(link) {
            if (!link) return null;
            const match = String(link).match(/[-\w]{25,}/);
            const fileId = match ? match[0] : null;
            return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000` : link;
        }

        function normalize(str) {
            return String(str || '').trim().toLowerCase();
        }

        function setFilter(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnText = btn.innerText.trim().toLowerCase();
                const filterText = category.trim().toLowerCase();
                if (btnText === filterText) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderGrid();
        }

        function getFilteredMembers() {
            const filterNorm = normalize(currentFilter);
            if (filterNorm === 'all') return allMembers;
            return allMembers.filter(member => {
                const catNorm = normalize(member.category);
                return catNorm.includes(filterNorm) || filterNorm.includes(catNorm);
            });
        }

        async function fetchMembers() {
            const sheetId = '1z1Lc7Bqw4eJCV19qGYDXF65oBkz8r0AS4k67yzaa_8c';
            const targetGid = '2'; // 3rd Tab
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${targetGid}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                
                allMembers = data.table.rows.filter(row => row.c && row.c[2]).map(row => {
                    const c = row.c;
                    const rawImageUrl = c[1] ? (c[1].v || c[1].f) : null;
                    const category = c[2] ? (c[2].v || c[2].f) : 'Other';
                    const name = c[3] ? (c[3].v || c[3].f) : 'Private Member';
                    const phone = c[4] ? (c[4].v || c[4].f) : ''; 
                    const social = c[5] ? (c[5].v || c[5].f) : ''; 
                    
                    const imageUrl = getDriveImageUrl(rawImageUrl);
                    const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=F3E5D8&color=C4A484&size=400`;
                    
                    return { name, category, phone, social, finalImg: imageUrl || fallbackUrl };
                });

                renderGrid();
            } catch (err) {
                console.error("Connectivity issue", err);
                document.getElementById('loading').innerHTML = `<p class="text-stone-400 text-[8px]">REGISTRY LINK INTERRUPTED</p>`;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('members-grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';

            const filtered = getFilteredMembers();

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-24 text-center text-stone-400 italic text-[9px] uppercase tracking-widest">No matching entries found</div>`;
            }

            filtered.forEach((member) => {
                const catNorm = normalize(member.category);
                const isAuthor = catNorm.includes('author');
                const cleanPhone = member.phone ? String(member.phone).replace(/\D/g, '') : '';
                const waLink = cleanPhone ? `https://wa.me/${cleanPhone}` : '#';
                const socialLink = member.social || '#';

                const card = `
                    <div class="member-card rounded-[25px] p-6 text-center">
                        <div class="image-frame mb-5">
                            <div class="image-inner">
                                <img 
                                    src="${member.finalImg}" 
                                    alt="${member.name}" 
                                    class="w-full h-full object-cover transition-opacity duration-700"
                                    onload="this.style.opacity=1"
                                    style="opacity: 0"
                                    onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&background=F3E5D8&color=C4A484&size=200'; this.style.opacity=1"
                                >
                            </div>
                        </div>
                        
                        <span class="category-badge mb-3 inline-block">
                            ${member.category}
                        </span>

                        <h3 class="text-base font-light text-stone-900 mb-6 tracking-tight leading-tight">${member.name}</h3>
                        
                        <div class="mt-auto space-y-2">
                            <!-- WhatsApp Reach Out Button -->
                            <a href="${waLink}" target="_blank" class="btn-premium flex items-center justify-center gap-2 w-full bg-stone-900 text-white py-2.5 rounded-full shadow-sm">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                WhatsApp Reach Out
                            </a>
                            
                            <!-- Know More Button -->
                            <a href="${socialLink}" target="_blank" class="btn-premium block w-full py-2.5 rounded-full btn-outline">
                                Know more about the member
                            </a>

                            <!-- Author Button -->
                            ${isAuthor ? `
                            <a href="books.html" class="btn-premium block w-full bg-indigo-600 text-white py-2.5 rounded-full shadow-sm">
                                View the Book
                            </a>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });

            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        window.onload = fetchMembers;
    </script>
</body>
</html>
