<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Members Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --skin-light: #FFF9F5;
            --skin-medium: #F3E5D8;
            --skin-warm: #E6D2C1;
            --skin-accent: #C4A484;
            --text-dark: #4A3E37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--skin-light);
            color: var(--text-dark);
        }

        .member-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            background-color: white;
            border: 1px solid var(--skin-medium);
        }

        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -15px rgba(196, 164, 132, 0.2);
            border-color: var(--skin-accent);
        }

        .image-frame {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(135deg, var(--skin-medium), var(--skin-accent));
            box-shadow: 0 10px 20px -5px rgba(196, 164, 132, 0.3);
        }

        .image-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            border-top-color: var(--skin-accent);
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .category-badge {
            background-color: var(--skin-medium);
            color: var(--skin-accent);
        }

        /* Modal Styles */
        .modal-overlay {
            background: rgba(74, 62, 55, 0.4);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        
        .modal-content {
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal-open .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="antialiased">

    <header class="py-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <span class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-[0.2em] text-stone-500 uppercase">
                Premium Community
            </span>
            <h1 class="text-4xl md:text-6xl font-light tracking-tight text-stone-800 mb-6">
                View Our Members
            </h1>
            <div class="w-16 h-1 bg-stone-300 mx-auto mb-8"></div>
            <p class="text-lg text-stone-500 max-w-2xl mx-auto leading-relaxed italic">
                A community built on excellence and shared vision.
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-stone-200 h-12 w-12 mb-4"></div>
            <p class="text-stone-400 uppercase tracking-widest text-xs font-bold">Synchronizing Directory</p>
        </div>

        <div id="members-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 hidden">
            <!-- Dynamic Content -->
        </div>

        <div id="error-container" class="hidden text-center py-20">
            <div class="bg-red-50 text-red-700 p-8 rounded-3xl inline-block max-w-md border border-red-100 shadow-sm">
                <p class="font-bold mb-2">Access Interrupted</p>
                <p class="text-sm opacity-80">Unable to load membership data.</p>
            </div>
        </div>
    </main>

    <!-- Detailed View Modal -->
    <div id="member-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none modal-overlay">
        <div class="bg-white w-full max-w-lg rounded-[40px] overflow-hidden shadow-2xl relative modal-content">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-stone-400 hover:text-stone-800 transition-colors p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="p-10 flex flex-col items-center text-center">
                <div class="image-frame mb-6 scale-90">
                    <div class="image-inner">
                        <img id="modal-img" src="" alt="" class="w-full h-full object-cover">
                    </div>
                </div>
                
                <span id="modal-category" class="category-badge px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-4"></span>
                <h3 id="modal-name" class="text-3xl font-semibold text-stone-800 mb-6"></h3>
                
                <div class="w-full text-left bg-stone-50 rounded-3xl p-8 border border-stone-100">
                    <h4 class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-3">About the Member</h4>
                    <p id="modal-about" class="text-stone-600 text-sm leading-relaxed font-light"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-16 border-t border-stone-200 text-center">
        <p class="text-stone-400 text-xs tracking-widest uppercase">&copy; 2026 Membership Community &bull; Professional Directory</p>
    </footer>

    <script>
        function getDriveImageUrl(link) {
            if (!link) return null;
            const match = String(link).match(/[-\w]{25,}/);
            const fileId = match ? match[0] : null;
            return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000` : link;
        }

        // Modal Functions
        function openModal(name, category, about, imgSrc) {
            const modal = document.getElementById('member-modal');
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-category').innerText = category;
            document.getElementById('modal-about').innerText = about;
            document.getElementById('modal-img').src = imgSrc;
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-open', 'overflow-hidden');
        }

        function closeModal() {
            const modal = document.getElementById('member-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-open', 'overflow-hidden');
        }

        // Close modal on escape key
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        async function fetchMembers() {
            const sheetId = '1z1Lc7Bqw4eJCV19qGYDXF65oBkz8r0AS4k67yzaa_8c';
            const gid = '0';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                renderMembers(data.table.rows);
            } catch (err) {
                console.error(err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-container').classList.remove('hidden');
            }
        }

        function renderMembers(rows) {
            const grid = document.getElementById('members-grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';

            rows.forEach((row) => {
                const c = row.c;
                if (!c || !c[2]) return; 

                const rawImageUrl = c[1] ? (c[1].v || c[1].f) : null;
                const name = c[2] ? (c[2].v || c[2].f) : 'Private Member';
                const category = c[3] ? (c[3].v || c[3].f) : 'Community Member';
                const about = c[4] ? (c[4].v || c[4].f) : 'No description provided.';

                const imageUrl = getDriveImageUrl(rawImageUrl);
                const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=F3E5D8&color=C4A484&size=256`;
                const finalImg = imageUrl || fallbackUrl;

                const card = `
                    <div class="member-card rounded-[40px] p-10 flex flex-col items-center text-center">
                        <div class="image-frame mb-8">
                            <div class="image-inner">
                                <img 
                                    src="${finalImg}" 
                                    alt="${name}" 
                                    class="w-full h-full object-cover transition-opacity duration-500"
                                    onload="this.style.opacity=1"
                                    style="opacity: 0;"
                                    onerror="this.onerror=null; this.src='${fallbackUrl}'; this.style.opacity=1;"
                                >
                            </div>
                        </div>
                        
                        <span class="category-badge px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-4">
                            ${category}
                        </span>

                        <h3 class="text-2xl font-semibold text-stone-800 mb-8">${name}</h3>
                        
                        <div class="mt-auto">
                            <button 
                                onclick="openModal('${name.replace(/'/g, "\\'")}', '${category.replace(/'/g, "\\'")}', '${about.replace(/'/g, "\\'")}', '${finalImg}')"
                                class="bg-stone-800 text-white px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-stone-600 transition-all shadow-lg hover:shadow-xl active:scale-95"
                            >
                                View Profile
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });

            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        window.onload = fetchMembers;
    </script>
</body>
</html>
