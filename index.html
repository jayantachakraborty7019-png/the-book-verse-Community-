<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="hJSoFmR9FEyp-b02Dt1Mt10y4e5fzP1JrnSjbgoghAU" />
    <title>The Book Verse Community</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="https://i.postimg.cc/52T9Pv60/IMG-20260316-122730-637.webp">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <!-- Custom Tailwind Configuration and Styles -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        skin: {
                            light: '#fdfbf7',  /* Creamy undertone */
                            base: '#f3e8e0',   /* Soft nude/beige */
                            dark: '#e0caba',   /* Warm tan */
                            text: '#4a3b32',   /* Deep taupe/brown for readable contrast */
                            accent: '#8c6b5d'  /* Muted terracotta/blush brown */
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Lora"', 'serif'], /* Using Lora for body to keep it literary */
                    }
                }
            }
        }
    </script>

    <style>
        body {
            /* Elegant skin-tone gradient background */
            background: linear-gradient(135deg, #fdfbf7 0%, #f3e8e0 50%, #e8d8ce 100%);
            margin: 0;
            overflow: hidden; /* Prevent scrolling on the landing page */
        }

        /* Ambient background glow elements to make it look premium */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }

        /* --- Animations --- */
        @keyframes subtleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes logoReveal {
            0% { 
                opacity: 0; 
                transform: scale(0.85) translateY(40px); 
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
                filter: blur(0);
            }
        }

        @keyframes textReveal {
            0% { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Animation Classes */
        .animate-logo {
            animation: logoReveal 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            /* Add subtle float after the reveal finishes */
            animation-delay: 0.2s;
        }

        .floating-logo-container {
            animation: subtleFloat 6s ease-in-out infinite 1.6s;
        }

        .animate-title {
            opacity: 0;
            animation: textReveal 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 0.8s;
        }

        .animate-subtitle {
            opacity: 0;
            animation: textReveal 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 1.1s;
        }

        .animate-button {
            opacity: 0;
            animation: textReveal 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 1.5s;
        }

        /* Premium button hover effect */
        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        
        .btn-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s ease;
        }

        .btn-premium:hover::after {
            left: 100%;
        }

        /* --- Browser Gate Styles --- */
        #chrome-warning {
            display: none; /* Hidden by default */
        }
        
        /* When body gets 'not-chrome' class, show warning and hide everything else */
        body.not-chrome {
            overflow: hidden;
        }
        body.not-chrome #chrome-warning {
            display: flex;
        }
        body.not-chrome #main-content,
        body.not-chrome .ambient-glow {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen text-skin-text font-sans flex items-center justify-center relative selection:bg-skin-dark selection:text-white">

    <!-- Decorative Ambient Background Elements -->
    <div class="ambient-glow w-96 h-96 bg-[#ffffff] top-[-10%] left-[-10%]"></div>
    <div class="ambient-glow w-[30rem] h-[30rem] bg-[#e5d0c0] bottom-[-15%] right-[-10%] opacity-50"></div>

    <!-- Chrome Required Overlay (Only visible on non-Chrome browsers) -->
    <div id="chrome-warning" class="fixed inset-0 z-[100] bg-skin-base flex-col items-center justify-center p-6 text-center">
        <div class="bg-skin-light p-10 rounded-3xl shadow-2xl max-w-md w-full border border-skin-dark relative overflow-hidden">
            <!-- Decorative corner elements -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-skin-dark rounded-full opacity-20 blur-2xl"></div>
            
            <svg class="w-20 h-20 mx-auto mb-6 text-skin-text relative z-10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <!-- Chrome Logo Approximation -->
                <path d="M12 2.25C6.615 2.25 2.25 6.615 2.25 12C2.25 17.385 6.615 21.75 12 21.75C17.385 21.75 21.75 17.385 21.75 12C21.75 6.615 17.385 2.25 12 2.25ZM12 6.75C14.1 6.75 15.93 7.995 16.815 9.825L12.33 17.58C10.02 17.295 8.25 15.345 8.25 12C8.25 11.025 8.52 10.125 9.015 9.375L12 6.75ZM12 17.25C11.535 17.25 11.085 17.145 10.68 16.965L15.15 9.225C15.54 10.035 15.75 10.98 15.75 12C15.75 14.895 13.395 17.25 12 17.25ZM5.76 14.595C5.43 13.785 5.25 12.915 5.25 12C5.25 9.495 6.63 7.32 8.64 6.135L13.11 13.875C12.825 14.34 12.435 14.73 11.97 15.015L5.76 14.595Z"/>
            </svg>
            
            <h2 class="text-3xl font-serif font-bold text-skin-text mb-3 relative z-10">Chrome Required</h2>
            <p class="text-skin-accent mb-8 font-sans leading-relaxed relative z-10">
                The Book Verse Community is exclusively optimized for Google Chrome. Please open this link in Chrome to enter the sanctuary.
            </p>
            
            <button onclick="copyCurrentUrl()" id="copy-btn" class="w-full px-6 py-4 bg-skin-text text-skin-base rounded-full font-sans text-sm font-semibold uppercase tracking-wider hover:bg-skin-accent transition-all duration-300 shadow-lg hover:-translate-y-1 relative z-10">
                Copy Link
            </button>
        </div>
    </div>

    <!-- Added ID "main-content" so we can hide it via JS -->
    <main id="main-content" class="relative z-10 flex flex-col items-center justify-center px-6 text-center w-full max-w-4xl mx-auto">
        
        <!-- Animated Logo -->
        <div class="floating-logo-container mb-10">
            <div class="animate-logo opacity-0">
                <div class="relative rounded-full p-2 bg-gradient-to-tr from-skin-dark to-skin-light shadow-[0_20px_40px_-15px_rgba(74,59,50,0.3)]">
                    <img 
                        src="https://i.postimg.cc/52T9Pv60/IMG-20260316-122730-637.webp" 
                        alt="The Book Verse Community Logo" 
                        class="w-48 h-48 md:w-56 md:h-56 object-cover rounded-full border-4 border-skin-light shadow-inner"
                        draggable="false"
                    >
                </div>
            </div>
        </div>

        <!-- Typography -->
        <h1 class="animate-title opacity-0 text-4xl md:text-5xl lg:text-6xl font-serif font-bold tracking-wide text-skin-text mb-4 drop-shadow-sm">
            The Book Verse Community
        </h1>
        
        <p class="animate-subtitle opacity-0 text-lg md:text-xl text-skin-accent max-w-2xl mx-auto mb-12 italic font-serif">
            "A sanctuary for pages turned, stories shared, and minds beautifully intertwined."
        </p>

        <!-- CTA Button -->
        <div class="animate-button opacity-0 mt-4">
            <a 
                href="https://thebookversecommunity.netlify.app/home" 
                class="btn-premium inline-flex items-center justify-center px-10 py-4 bg-skin-text text-skin-base rounded-full font-sans tracking-[0.15em] uppercase text-sm font-semibold shadow-xl hover:bg-skin-accent hover:shadow-2xl hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-skin-dark focus:ring-opacity-50"
            >
                Explore Book Verse
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-3 transition-transform duration-300 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>

    </main>

    <!-- Browser Detection Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Check if the browser is Chrome (Excludes Edge, Opera, Safari, Firefox)
            const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor) && !/Edg|OPR/.test(navigator.userAgent);
            const isIOSChrome = /CriOS/.test(navigator.userAgent); // Specific check for iOS Chrome

            // If it is NOT Chrome, activate the gate
            if (!isChrome && !isIOSChrome) {
                document.body.classList.add('not-chrome');
            }
        });

        function copyCurrentUrl() {
            const url = window.location.href;
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerText;
            
            // Clipboard API for modern browsers
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(() => {
                    showCopiedSuccess(btn, originalText);
                });
            } else {
                // Fallback for older browsers / non-secure contexts
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showCopiedSuccess(btn, originalText);
                } catch (err) {
                    btn.innerText = "Failed to copy";
                }
                document.body.removeChild(textArea);
            }
        }

        function showCopiedSuccess(btn, originalText) {
            btn.innerText = "Link Copied! ✓";
            btn.classList.add("bg-green-700"); // Add success color
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove("bg-green-700");
            }, 3000);
        }
    </script>
</body>
</html>
